name: Build (reusable)

# Reusable workflow that does the heavy lifting: install xcodegen, generate
# project, build/test, optionally sign with Developer ID and notarize, then
# package into DMG + ZIP. Both `build.yml` (CI) and `release.yml` (tagged
# releases) call this with different inputs.

on:
  workflow_call:
    inputs:
      upload-artifacts:
        description: 'Upload DMG/ZIP as workflow artifacts'
        required: false
        default: false
        type: boolean
      release:
        description: 'Full release flow — sign with Developer ID and notarize'
        required: false
        default: false
        type: boolean
    secrets:
      APPLE_CERTIFICATE:
        required: false
      APPLE_CERTIFICATE_PASSWORD:
        required: false
      APPLE_ID:
        required: false
      APPLE_APP_SPECIFIC_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Clacky.xcodeproj \
            -scheme Clacky \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            -enableCodeCoverage NO

      # ----- Code signing setup (release only) ------------------------------
      - name: Import signing certificate
        if: inputs.release
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "Missing APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD secrets"
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/clacky-build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Apple's intermediate CAs (so the chain is complete inside this temp keychain)
          curl -sLO https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          curl -sLO https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          security import DeveloperIDG2CA.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security import AppleWWDRCAG3.cer  -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          rm -f DeveloperIDG2CA.cer AppleWWDRCAG3.cer

          # Developer ID Application cert (.p12 → base64 → decoded into temp file)
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$CERT_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[\" ]//g')

          # Surface to later steps
          echo "KEYCHAIN_NAME=$KEYCHAIN_PATH"             >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD"     >> "$GITHUB_ENV"

          echo "==> Identities visible in temp keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build, sign, notarize, package
        if: inputs.release
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # KEYCHAIN_NAME / KEYCHAIN_PASSWORD already exported by previous step
        run: |
          # Derive the Developer ID identity from the keychain — avoids hard-
          # coding the developer's name as a secret. Mirrors CineScreen's pattern.
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          DEVELOPER_ID_APPLICATION=$(security find-identity -v -p codesigning "$KEYCHAIN_NAME" \
            | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$DEVELOPER_ID_APPLICATION" ]; then
            echo "Could not find 'Developer ID Application' identity in keychain" >&2
            exit 1
          fi
          echo "Signing with: $DEVELOPER_ID_APPLICATION"
          export DEVELOPER_ID_APPLICATION
          bash scripts/make_release.sh

      - name: Upload artifacts
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Clacky-macOS
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: ignore
