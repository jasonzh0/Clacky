name: Clacky
options:
  bundleIdPrefix: com.clacky
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    MARKETING_VERSION: "0.1.1"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.10"
    ENABLE_HARDENED_RUNTIME: YES
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "-"
      DEVELOPMENT_TEAM: ""
      # Hardened runtime not strictly required for Debug; keeping on so dev
      # builds catch any entitlement issues early.
    Release:
      # Manual signing — identity is supplied via xcodebuild CLI flags or env
      # by the release script / GitHub Actions workflow:
      #   CODE_SIGN_IDENTITY="Developer ID Application: ..."
      #   DEVELOPMENT_TEAM="ABCDE12345"
      # If those are not set the build falls back to ad-hoc signing, which
      # works locally but won't pass Gatekeeper on other Macs.
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "-"
      DEVELOPMENT_TEAM: ""
      OTHER_CODE_SIGN_FLAGS: "--timestamp"

targets:
  Clacky:
    type: application
    platform: macOS
    sources:
      - path: Clacky
        excludes:
          - "**/.DS_Store"
          - "Resources/**"
      - path: Clacky/Resources/SoundPacks
        type: folder
        buildPhase: resources
    info:
      path: Clacky/Info.plist
      properties:
        CFBundleName: Clacky
        CFBundleDisplayName: Clacky
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHumanReadableCopyright: "Released under the MIT License."
        NSAccessibilityUsageDescription: "Clacky needs Accessibility access to detect keystrokes globally so it can play sounds as you type. It does not record or store what you type."
    entitlements:
      path: Clacky/Clacky.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clacky.Clacky
        PRODUCT_NAME: Clacky
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES

  ClackyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClackyTests
    dependencies:
      - target: Clacky
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clacky.ClackyTests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Clacky.app/Contents/MacOS/Clacky

schemes:
  Clacky:
    build:
      targets:
        Clacky: all
        ClackyTests: [test]
    test:
      targets:
        - ClackyTests
    run:
      config: Debug
    archive:
      config: Release
