name: Clacky
options:
  bundleIdPrefix: com.clacky
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Clacky:
    type: application
    platform: macOS
    sources:
      - path: Clacky
        excludes:
          - "**/.DS_Store"
          - "Resources/**"
      - path: Clacky/Resources/SoundPacks
        type: folder
        buildPhase: resources
    info:
      path: Clacky/Info.plist
      properties:
        CFBundleName: Clacky
        CFBundleDisplayName: Clacky
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHumanReadableCopyright: "Released under the MIT License."
        NSAccessibilityUsageDescription: "Clacky needs Accessibility access to detect keystrokes globally so it can play sounds as you type. It does not record or store what you type."
    entitlements:
      path: Clacky/Clacky.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clacky.Clacky
        PRODUCT_NAME: Clacky
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES

  ClackyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClackyTests
    dependencies:
      - target: Clacky
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clacky.ClackyTests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Clacky.app/Contents/MacOS/Clacky

schemes:
  Clacky:
    build:
      targets:
        Clacky: all
        ClackyTests: [test]
    test:
      targets:
        - ClackyTests
    run:
      config: Debug
    archive:
      config: Release
